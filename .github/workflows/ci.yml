name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o vulngate-linux-amd64 .

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o vulngate-linux-arm64 .

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o vulngate-darwin-amd64 .

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o vulngate-darwin-arm64 .

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o vulngate.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            vulngate-linux-amd64
            vulngate-linux-arm64
            vulngate-darwin-amd64
            vulngate-darwin-arm64
            vulngate.exe

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vulngate-linux-amd64
            vulngate-linux-arm64
            vulngate-darwin-amd64
            vulngate-darwin-arm64
            vulngate.exe

  scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
