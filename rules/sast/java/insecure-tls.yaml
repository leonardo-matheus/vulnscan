rules:
  - id: java-insecure-tls-hostnameverifier
    pattern: |
      new HostnameVerifier() { ... return true; ... }
    message: >
      Insecure TLS: HostnameVerifier returns true, disabling hostname verification.
    languages: [java]
    severity: ERROR
    metadata:
      category: security
      cwe:
        - id: "CWE-295"
          name: "Improper Certificate Validation"

  - id: java-insecure-trust-all
    pattern: |
      TrustManager[] $TM = new TrustManager[]{ new X509TrustManager() { ... } };
    message: >
      Insecure TLS: TrustManager does not validate certificates.
    languages: [java]
    severity: ERROR
    metadata:
      category: security
      cwe:
        - id: "CWE-295"
          name: "Improper Certificate Validation"
