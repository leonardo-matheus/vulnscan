rules:
  - id: react-dangerously-set-inner-html
    pattern: |
      <$TAG dangerouslySetInnerHTML=... />
    message: >
      XSS risk: dangerouslySetInnerHTML bypasses React's XSS protection.
      Sanitize input before using dangerouslySetInnerHTML.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe:
        - id: "CWE-79"
          name: "Cross-site Scripting (XSS)"

  - id: react-dangerously-set-inner-html-obj
    pattern: |
      <$TAG dangerouslySetInnerHTML={{ __html: $VAR }} />
    message: >
      XSS risk: dangerouslySetInnerHTML with dynamic value.
      Sanitize $VAR before rendering.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe:
        - id: "CWE-79"
          name: "Cross-site Scripting (XSS)"

  - id: react-dangerously-set-inner-html-var
    pattern: |
      <$TAG dangerouslySetInnerHTML=$OBJ />
    message: >
      XSS risk: dangerouslySetInnerHTML with object variable.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe:
        - id: "CWE-79"
          name: "Cross-site Scripting (XSS)"
